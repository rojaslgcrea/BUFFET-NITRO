<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Nitro - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .active-tab { border-bottom: 4px solid #ffffff; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-black text-center text-indigo-700 mb-6">BUFFET NITRO 🚀</h1>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Usuario" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="pass-input" placeholder="Contraseña" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <nav class="bg-indigo-700 text-white shadow-lg sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <span class="font-bold text-sm" id="welcome-msg"></span>
                <div class="flex space-x-4 text-xs font-bold uppercase">
                    <button onclick="showSection('votar')" id="tab-votar" class="nav-link py-1">Votar</button>
                    <button onclick="showSection('proponer')" id="tab-proponer" class="nav-link py-1">Proponer</button>
                    <button onclick="showSection('resultado')" id="tab-resultado" class="nav-link py-1">Resultados</button>
                    <button id="admin-nav" onclick="showSection('admin')" class="nav-link py-1 hidden">Admin</button>
                    <button onclick="logout()" class="text-indigo-200">Salir</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-6">
            <section id="votar" class="section-content">
                <h2 class="text-2xl font-bold mb-4">Menú de Mañana</h2>
                <form id="voteForm" class="grid gap-4 md:grid-cols-2"></form>
                <button onclick="enviarVotos()" class="mt-8 w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition">ENVIAR VOTOS</button>
            </section>

            <section id="resultado" class="section-content hidden">
                <h2 class="text-2xl font-bold mb-6">Popularidad Histórica</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm mb-8">
                    <canvas id="statsChart"></canvas>
                </div>
            </section>

            <section id="proponer" class="section-content hidden">
                <h2 class="text-2xl font-bold mb-4">Proponer Plato</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                    <select id="prop-cat" class="w-full p-3 border rounded-xl"></select>
                    <input type="text" id="prop-nombre" placeholder="Nombre del plato" class="w-full p-3 border rounded-xl">
                    <button onclick="subirPropuesta()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl">ENVIAR PROPUESTA</button>
                </div>
            </section>

            <section id="admin" class="section-content hidden">
                <h2 class="text-2xl font-bold mb-6">Panel de Control</h2>
                <div class="mb-8">
                    <h3 class="font-bold text-indigo-600 mb-2">Gestión de Personal</h3>
                    <div class="bg-white rounded-xl shadow overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50"><tr><th class="p-3">Usuario</th><th class="p-3">Nombre</th><th class="p-3">Rol</th><th class="p-3">Acción</th></tr></thead>
                            <tbody id="userTableBody"></tbody>
                        </table>
                        <div class="p-4 bg-slate-50 border-t flex gap-2">
                            <input type="text" id="nu" placeholder="Usuario" class="p-2 border rounded w-1/4">
                            <input type="text" id="nc" placeholder="Clave" class="p-2 border rounded w-1/4">
                            <input type="text" id="nn" placeholder="Nombre" class="p-2 border rounded w-1/4">
                            <select id="nr" class="p-2 border rounded w-1/4"><option value="USER">USER</option><option value="ADMIN">ADMIN</option></select>
                            <button onclick="addUser()" class="bg-indigo-600 text-white px-4 rounded">Agregar</button>
                        </div>
                    </div>
                </div>
                </section>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxcwj1EPul5miJCdcak95y_6AUZdF5DSyRCJKhJKLz4HuhV2gwEcuK1GFail_Tlwg/exec"; // REEMPLAZA ESTO
        let currentUser = JSON.parse(localStorage.getItem('buffet_session'));

        document.addEventListener('DOMContentLoaded', () => {
            if (currentUser) loginSuccess(currentUser);
        });

        async function handleLogin() {
            const usuario = document.getElementById('user-input').value;
            const clave = document.getElementById('pass-input').value;
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', usuario, clave })
            });
            const data = await res.json();
            if (data.success) {
                const session = { usuario, nombre: data.nombre, rol: data.rol };
                localStorage.setItem('buffet_session', JSON.stringify(session));
                loginSuccess(session);
            } else {
                alert(data.message);
            }
        }

        function loginSuccess(session) {
            currentUser = session;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Hola, ${session.nombre}`;
            if (session.rol === 'ADMIN') document.getElementById('admin-nav').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            const res = await fetch(API_URL + "?action=get_opciones");
            const json = await res.json();
            renderMenu(json.data);
            const userRes = await fetch(API_URL + "?action=get_usuarios");
            const userData = await userRes.json();
            renderUsers(userData.users);
        }

        function renderMenu(menu) {
            const form = document.getElementById('voteForm');
            form.innerHTML = '';
            const propCat = document.getElementById('prop-cat');
            propCat.innerHTML = '';
            
            for (const cat in menu) {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm";
                div.innerHTML = `<label class="block font-bold mb-2 text-indigo-600 text-xs uppercase">${cat}</label>
                    <select name="${cat}" class="w-full p-2 border rounded-lg" required>
                    <option value="">Seleccionar...</option>
                    ${menu[cat].map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
                form.appendChild(div);
                propCat.innerHTML += `<option value="${cat}">${cat}</option>`;
            }
        }

        async function enviarVotos() {
            const formData = new FormData(document.getElementById('voteForm'));
            const selecciones = Object.fromEntries(formData);
            if (Object.values(selecciones).some(v => v === "")) return alert("Selecciona una opción por categoría.");

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'votar', usuario: currentUser.usuario, selecciones })
            });
            const data = await res.json();
            alert(data.message);
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = users.map(u => `
                <tr class="border-b">
                    <td class="p-3">${u[0]}</td><td class="p-3">${u[2]}</td><td class="p-3">${u[3]}</td>
                    <td class="p-3"><button onclick="deleteUser('${u[0]}')" class="text-red-500 text-xs">Eliminar</button></td>
                </tr>`).join('');
        }

        async function addUser() {
            const u = document.getElementById('nu').value;
            const c = document.getElementById('nc').value;
            const n = document.getElementById('nn').value;
            const r = document.getElementById('nr').value;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'crud_usuarios', subAction: 'agregar', u, c, n, r }) });
            fetchData();
        }

        async function deleteUser(u) {
            if (!confirm("¿Eliminar usuario?")) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'crud_usuarios', subAction: 'eliminar', u }) });
            fetchData();
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-tab'));
            document.getElementById('tab-' + id).classList.add('active-tab');
            if(id === 'resultado') renderStats();
        }

        async function renderStats() {
            const res = await fetch(API_URL + "?action=get_stats");
            const data = await res.json();
            const ctx = document.getElementById('statsChart').getContext('2d');
            if (window.chartObj) window.chartObj.destroy();
            window.chartObj = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(data.stats), datasets: [{ label: 'Votos Históricos', data: Object.values(data.stats), backgroundColor: '#6366f1' }] },
                options: { indexAxis: 'y' }
            });
        }

        function logout() { localStorage.removeItem('buffet_session'); location.reload(); }
    </script>
</body>
</html>
